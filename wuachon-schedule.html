<title>ตารางการแข่งขัน — วัวชนไทย</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#C8102E;
  --gold:#F5A800;
  --dark:#0d1a0f;
  --dark2:#152018;
  --cream:#FFF8EC;
  --green:#1B6B2F;
  --green2:#27943F;
  --card:#1a2e1c;
  --border:rgba(245,168,0,0.2);
}
body{font-family:'Sarabun',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(13,26,15,0.97);
  border-bottom:2px solid var(--gold);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.nav-logo{font-family:'Kanit',sans-serif;font-weight:900;font-size:20px;color:var(--gold);}
.nav-logo em{color:var(--red);font-style:normal;}
.nav-links{display:flex;gap:24px;}
.nav-links a{color:rgba(255,248,236,0.6);text-decoration:none;font-family:'Kanit',sans-serif;font-size:14px;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-user{display:flex;align-items:center;gap:10px;}
.nav-user .username{font-family:'Kanit',sans-serif;font-size:13px;color:var(--gold);}
.btn-login{background:var(--red);color:#fff;font-family:'Kanit',sans-serif;font-size:13px;padding:6px 16px;border-radius:6px;border:none;cursor:pointer;}

/* HERO */
.hero{
  text-align:center;padding:64px 20px 48px;
  position:relative;overflow:hidden;
  background:#0a1010;
  min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.hero-ember{
  position:absolute;border-radius:50%;pointer-events:none;z-index:3;
  animation:emberRise var(--dur,4s) linear infinite var(--delay,0s);
}
@keyframes bgPan{
  0%,100%{background-position:center 40%; background-size:110% auto;}
  33%{background-position:45% 38%; background-size:115% auto;}
  66%{background-position:55% 42%; background-size:112% auto;}
}
@keyframes bgGlow{
  0%,100%{filter:brightness(1) saturate(1.1);}
  50%{filter:brightness(1.15) saturate(1.3);}
}
@keyframes flickerRed{
  0%,100%{opacity:.7;transform:scaleY(1);}
  25%{opacity:.9;transform:scaleY(1.04);}
  50%{opacity:.6;transform:scaleY(.97);}
  75%{opacity:.85;transform:scaleY(1.02);}
}
@keyframes flickerBlue{
  0%,100%{opacity:.65;transform:scaleY(1);}
  30%{opacity:.85;transform:scaleY(1.03);}
  60%{opacity:.5;transform:scaleY(.98);}
}
@keyframes emberRise{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:var(--op,.9);}
  40%{transform:translateY(-60px) translateX(var(--dx,8px)) scale(1.4);opacity:.7;}
  80%{transform:translateY(-120px) translateX(calc(var(--dx,8px)*-1)) scale(.7);opacity:.3;}
  100%{transform:translateY(-160px) translateX(0) scale(.2);opacity:0;}
}
/* Shimmer text effect */
@keyframes shimmerText{
  0%,100%{text-shadow:0 0 20px rgba(245,168,0,.4),0 2px 8px rgba(0,0,0,.9);}
  50%{text-shadow:0 0 35px rgba(245,168,0,.8),0 0 60px rgba(245,168,0,.3),0 2px 8px rgba(0,0,0,.9);}
}
.hero h1{
  font-family:'Kanit',sans-serif;font-weight:900;font-size:clamp(30px,5vw,46px);
  color:var(--cream);position:relative;z-index:4;
  animation:shimmerText 3s ease-in-out infinite;
  text-shadow:0 0 20px rgba(245,168,0,.4),0 2px 8px rgba(0,0,0,.9);
}
.hero h1 span{color:var(--gold);}
.hero-divider{
  width:80px;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:12px auto;position:relative;z-index:4;
  animation:dividerGlow 2.5s ease-in-out infinite;
}
@keyframes dividerGlow{
  0%,100%{opacity:.7;width:60px;}
  50%{opacity:1;width:110px;box-shadow:0 0 12px var(--gold);}
}
.hero p{
  color:rgba(255,248,236,.75);font-size:14px;
  position:relative;z-index:4;
  text-shadow:0 1px 6px rgba(0,0,0,.8);
}

/* CONTAINER */
.container{max-width:900px;margin:0 auto;padding:0 16px 60px;}

/* FILTER */
.filter-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.filter-btn{
  font-family:'Kanit',sans-serif;font-size:13px;
  padding:7px 18px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:rgba(255,248,236,0.5);cursor:pointer;
  transition:all .2s;
}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:700;}

/* MATCH CARD */
.match-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:16px;
  overflow:hidden;
  transition:border-color .2s, box-shadow .2s;
}
.match-card:hover{border-color:rgba(245,168,0,0.5);box-shadow:0 4px 24px rgba(0,0,0,0.3);}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;
  background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border);
  gap:10px;flex-wrap:wrap;
}
.card-round{font-family:'Kanit',sans-serif;font-weight:700;font-size:15px;color:var(--gold);}
.card-meta{display:flex;gap:14px;align-items:center;}
.card-meta span{font-size:12px;color:rgba(255,248,236,0.5);}
.card-meta span b{color:rgba(255,248,236,0.8);}

.status-badge{
  font-family:'Kanit',sans-serif;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;
}
.status-upcoming{background:rgba(245,168,0,0.15);color:var(--gold);border:1px solid rgba(245,168,0,0.3);}
.status-live{background:rgba(200,16,46,0.2);color:#ff6b6b;border:1px solid rgba(200,16,46,0.4);animation:pulse 1.5s infinite;}
.status-done{background:rgba(27,107,47,0.2);color:#7ddc8e;border:1px solid rgba(27,107,47,0.4);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

.card-body{padding:18px;}
.vs-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;}
.bull-side{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bull-icon{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.bull-red{background:rgba(200,16,46,0.15);border:2px solid rgba(200,16,46,0.4);}
.bull-blue{background:rgba(30,80,200,0.15);border:2px solid rgba(30,80,200,0.4);}
.bull-name{font-family:'Kanit',sans-serif;font-weight:700;font-size:15px;text-align:center;}
.bull-owner{font-size:12px;color:rgba(255,248,236,0.45);text-align:center;}
.bull-weight{
  font-size:11px;background:rgba(255,255,255,0.06);
  padding:2px 8px;border-radius:10px;color:rgba(255,248,236,0.6);
}
.vs-center{text-align:center;}
.vs-label{font-family:'Kanit',sans-serif;font-weight:900;font-size:18px;color:var(--gold);}
.prize-amount{font-family:'Kanit',sans-serif;font-weight:700;font-size:13px;color:var(--gold);margin-top:4px;}
.total-bet{font-size:11px;color:rgba(255,248,236,0.4);margin-top:2px;}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.1);
}
.bets-count{font-size:12px;color:rgba(255,248,236,0.4);}
.bets-count b{color:var(--gold);}
.btn-bet{
  font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;
  padding:7px 20px;border-radius:8px;
  background:var(--green2);color:#fff;border:none;cursor:pointer;
  transition:background .2s;
}
.btn-bet:hover{background:#2fa848;}
.btn-bet:disabled{background:#333;color:#666;cursor:not-allowed;}

/* WINNER BADGE */
.winner-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 18px;
  background:rgba(27,107,47,0.1);
  border-top:1px solid rgba(27,107,47,0.2);
  font-family:'Kanit',sans-serif;font-size:13px;color:#7ddc8e;
}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-text{font-family:'Kanit',sans-serif;color:rgba(255,248,236,0.3);font-size:16px;}

/* LOADING SKELETON */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,0.04) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px;height:160px;margin-bottom:16px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1e3a1e;border:1px solid var(--green2);color:#fff;font-family:'Kanit',sans-serif;font-size:14px;padding:12px 20px;border-radius:10px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:600px){
  .vs-row{grid-template-columns:1fr auto 1fr;}
  .bull-icon{width:48px;height:48px;font-size:22px;}
  .bull-name{font-size:13px;}
  nav{padding:10px 14px;}
  .nav-links{display:none;}
}

  position:relative;overflow:hidden;
  min-height:160px;
  display:flex;flex-direction:column;

.vs-footer-overlay{

  background:linear-gradient(
    180deg,
    rgba(13,10,20,.7) 0%,

    rgba(13,10,20,.3) 60%,

  z-index:1;
}

/* Wave lines */
.vs-wave{
  position:absolute;left:-20%;right:-20%;
  height:2px;border-radius:99px;z-index:2;
  pointer-events:none;
}
.vs-wave-1{
  top:38%;
  background:linear-gradient(90deg,transparent 0%,rgba(255,100,0,.0) 20%,rgba(255,160,0,.7) 45%,rgba(255,255,180,.9) 50%,rgba(100,80,255,.7) 55%,rgba(100,80,255,.0) 80%,transparent 100%);
  animation:waveSlide 3s ease-in-out infinite;
}
.vs-wave-2{
  top:50%;
  background:linear-gradient(90deg,transparent 0%,rgba(255,60,0,.0) 15%,rgba(255,100,0,.5) 40%,rgba(255,220,80,.8) 50%,rgba(60,120,255,.5) 60%,rgba(60,120,255,.0) 85%,transparent 100%);
  animation:waveSlide 3.8s ease-in-out infinite .4s;
  height:3px;
}
.vs-wave-3{
  top:62%;
  background:linear-gradient(90deg,transparent 0%,rgba(200,0,100,.0) 25%,rgba(255,80,160,.4) 45%,rgba(255,255,255,.6) 50%,rgba(80,80,255,.4) 55%,rgba(80,80,255,.0) 75%,transparent 100%);
  animation:waveSlide 4.5s ease-in-out infinite .8s;
}
@keyframes waveSlide{
  0%,100%{opacity:.6;transform:scaleX(.9) translateX(-3%);}
  50%{opacity:1;transform:scaleX(1.05) translateX(3%);}
}

/* Sparks */
.vs-spark{
  position:absolute;width:5px;height:5px;border-radius:50%;
  background:var(--c,#ffaa00);
  box-shadow:0 0 10px var(--c,#ffaa00), 0 0 20px var(--c,#ffaa00);
  pointer-events:none;z-index:3;
  animation:vsSparkPulse var(--dur,3s) ease-in-out infinite var(--delay,0s);
}
.vs-spark-big{width:8px;height:8px;}
@keyframes vsSparkPulse{
  0%,100%{transform:scale(1) translateY(0);opacity:.8;}
  33%{transform:scale(1.6) translateY(-8px);opacity:1;}
  66%{transform:scale(.7) translateY(4px);opacity:.5;}
}

/* VS text */
.vs-footer-text{
  font-family:'Kanit',sans-serif;font-weight:900;
  font-size:clamp(36px,7vw,64px);
  color:#fff;
  position:relative;z-index:4;letter-spacing:.06em;
  animation:vsTextGlow 2.5s ease-in-out infinite;
  text-shadow:0 0 20px rgba(255,255,255,.4);
}
@keyframes vsTextGlow{
  0%,100%{
    text-shadow:0 0 20px rgba(255,200,0,.5),0 0 40px rgba(255,100,0,.3),0 2px 0 rgba(0,0,0,.8);
    transform:scale(1);
  }
  50%{

    transform:scale(1.04);

}
.vs-footer-sub{
  color:rgba(255,248,236,.65);font-size:14px;

.vs-footer-btn{

@keyframes btnPulse{

}
@keyframes vsBgPan{

}
</style>

<div class="hero">

  <div class="hero-ember" style="width:5px;height:5px;background:#0066ff;bottom:14%;right:15%;--dur:3.2s;--delay:-.2s;--dx:-14px;--op:1;box-shadow:0 0 8px #0066ff;"></div>

<div class="container">

    <button class="filter-btn" data-filter="upcoming" onclick="filterMatches('upcoming',this)">⏳ รอแข่ง</button>
    <button class="filter-btn" data-filter="live" onclick="filterMatches('live',this)">🔴 กำลังแข่ง</button>

  <div id="matches-container">

<!-- VS FOOTER BANNER -->
<div class="vs-footer-banner">

</div>

<div class="toast" id="toast"></div>

<script>
// ===== SUPABASE INIT =====
const SUPA_URL = 'https://xzlpdeqlfczjkospfqqi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bHBkZXFsZmN6amtvc3BmcXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NzgyMjAsImV4cCI6MjA5NTI1NDIyMH0.W0pDFJy3lFeO4ht9DpNzeDgVdGvSz94p0KWGfzc0Igw';

let sb;
try {
  sb = supabase.createClient(SUPA_URL, SUPA_KEY);
} catch(e) {
  console.error('Supabase init error:', e);
}

// ===== STATE =====
let allMatches = [];
let currentFilter = 'all';
let currentUser = null;

// ===== INIT =====
window.addEventListener('DOMContentLoaded', async () => {
  // โหลด user จาก session
  try {
    const raw = sessionStorage.getItem('bw_user');
    if (raw) {
      currentUser = JSON.parse(raw);
      document.getElementById('nav-user-area').innerHTML =
        `<span class="username">👤 ${currentUser.nick}</span>`;
    }
  } catch(e) {}

  // โหลด matches ครั้งแรก
  await loadMatches();

  // Subscribe real-time
  subscribeRealtime();

  // Polling fallback ทุก 30 วิ
  setInterval(loadMatches, 30000);
});

// ===== LOAD MATCHES =====
async function loadMatches() {
  try {
    // ดึงเฉพาะ upcoming และ live เท่านั้น
    const { data, error } = await sb
      .from('matches')
      .select('*, bets(count)')
      .order('date', { ascending: true })
      .order('time', { ascending: true });

    if (error) {
      console.error('loadMatches error:', error.message);
      const { data: data2, error: e2 } = await sb
        .from('matches')
        .select('*')
        .order('created_at', { ascending: false });
      if (e2) { showEmpty('ไม่สามารถโหลดข้อมูลได้'); return; }
      // กรองเอาเฉพาะที่ยังไม่จบ
      allMatches = (data2 || []).filter(m => {
        const s = normalizeStatus(m.status);
        return s === 'upcoming' || s === 'live';
      });
    } else {
      // กรองเอาเฉพาะ upcoming + live
      allMatches = (data || []).filter(m => {
        const s = normalizeStatus(m.status);
        return s === 'upcoming' || s === 'live';
      });
    }

    console.log('loadMatches:', allMatches.length, 'matches (upcoming+live)');
    renderMatches();
  } catch(e) {
    console.error('loadMatches exception:', e);
    showEmpty('เกิดข้อผิดพลาดในการโหลด');
  }
}

// ===== SUBSCRIBE REALTIME =====
function subscribeRealtime() {
  const channel = sb.channel('schedule-matches-' + Date.now())
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'matches'
    }, (payload) => {
      console.log('Realtime event:', payload.eventType, payload.new?.status);

      // ถ้า match เปลี่ยนเป็น done → animate ออกทันทีแล้วโหลดใหม่
      if (payload.eventType === 'UPDATE' && payload.new) {
        const newStatus = normalizeStatus(payload.new.status);
        if (newStatus === 'done') {
          const cardEl = document.querySelector(`[data-match-id="${payload.new.id}"]`);
          if (cardEl) {
            cardEl.style.transition = 'opacity .5s, transform .5s, max-height .5s';
            cardEl.style.opacity = '0';
            cardEl.style.transform = 'translateX(60px)';
            cardEl.style.maxHeight = cardEl.offsetHeight + 'px';
            setTimeout(() => {
              cardEl.style.maxHeight = '0';
              cardEl.style.marginBottom = '0';
              cardEl.style.padding = '0';
            }, 300);
            setTimeout(() => {
              // อัปเดต allMatches แล้ว re-render
              allMatches = allMatches.filter(m => m.id !== payload.new.id);
              renderMatches();
            }, 600);
            return;
          }
        }
      }
      loadMatches();
    })
    .subscribe((status) => {
      console.log('Realtime status:', status);
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        setTimeout(subscribeRealtime, 5000);
      }
    });
}

// ===== FILTER =====
function filterMatches(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

// ===== RENDER =====
function renderMatches() {
  const container = document.getElementById('matches-container');

  // กรอง done ออกเสมอ (แสดงเฉพาะ upcoming + live)
  let filtered = allMatches.filter(m => {
    const s = normalizeStatus(m.status);
    return s === 'upcoming' || s === 'live';
  });

  if (currentFilter === 'upcoming') {
    filtered = filtered.filter(m => normalizeStatus(m.status) === 'upcoming');
  } else if (currentFilter === 'live') {
    filtered = filtered.filter(m => normalizeStatus(m.status) === 'live');
  }

  if (filtered.length === 0) {
    showEmpty('ไม่มีรายการแข่งขันที่กำลังจะมาถึง');
    return;
  }

  container.innerHTML = filtered.map(m => renderCard(m)).join('');
}

// แปลง status ไม่ว่าจะเป็นไทยหรืออังกฤษ → 'upcoming' | 'live' | 'done'
function normalizeStatus(raw) {
  const s = (raw || '').toLowerCase().trim();
  if (s === 'live' || s === 'กำลังแข่ง' || s === 'live') return 'live';
  if (s === 'done' || s === 'จบแล้ว' || s === 'finish' || s === 'finished') return 'done';
  return 'upcoming'; // default: upcoming, รอแข่ง, '', null
}

// แปลง date string ให้อ่านง่าย
function formatDate(d) {
  if (!d) return '';
  // รองรับ dd.mm.yyyy, dd/mm/yyyy, yyyy-mm-dd
  const m1 = d.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})$/);
  if (m1) {
    const [, dd, mm, yy] = m1;
    const year = yy.length === 2 ? '25' + yy : yy;
    const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${parseInt(dd)} ${months[parseInt(mm)] || mm} ${year}`;
  }
  return d; // คืนค่าเดิมถ้าไม่ตรง pattern
}

function renderCard(m) {
  const status = normalizeStatus(m.status);
  const isUpcoming = status === 'upcoming';
  const isLive = status === 'live';
  const isDone = status === 'done';

  let statusLabel = '⏳ รอแข่ง';
  let statusClass = 'status-upcoming';
  if (isLive) { statusLabel = '🔴 กำลังแข่ง'; statusClass = 'status-live'; }
  if (isDone) { statusLabel = '✅ จบแล้ว'; statusClass = 'status-done'; }

  const prize = m.prize ? Number(m.prize).toLocaleString('th-TH') + ' ฿' : '—';
  const betsCount = m.bets?.[0]?.count ?? 0;
  const canBet = isUpcoming; // เปิดให้กดเสมอ ถ้ายังรอแข่ง (login check ทีหลังใน match page)

  const winnerRow = (status === 'done' && m.winner)
    ? `<div class="winner-row">🏆 ผู้ชนะ: <b>${m.winner === 'red' ? (m.name_a || 'เจ้าบ้าน') : (m.name_b || 'ทีมเยือน')}</b></div>`
    : '';

  // รหัสแมช
  const codeTag = m.code
    ? `<span style="background:var(--green);color:#fff;font-family:'Kanit',sans-serif;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;">รหัส ${m.code}</span>`
    : '';

  return `
  <div class="match-card" data-match-id="${m.id}">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span class="card-round">${m.round || 'รุ่นทั่วไป'}</span>
        ${codeTag}
      </div>
      <div class="card-meta">
        ${m.date ? `<span>📅 <b>${formatDate(m.date)}</b></span>` : ''}
        ${m.time ? `<span>🕐 <b>${m.time}</b></span>` : ''}
        ${m.location ? `<span>📍 <b>${m.location}</b></span>` : ''}
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
    </div>
    <div class="card-body">
      <div class="vs-row">
        <div class="bull-side">
          <div class="bull-icon bull-red">🐂</div>
          <div class="bull-name" style="color:#ff8c8c;">${m.name_a || 'เจ้าบ้าน'}</div>
          ${m.owner_a ? `<div class="bull-owner">${m.owner_a}</div>` : ''}
          ${m.weight_a ? `<div class="bull-weight">⚖️ ${m.weight_a} กก.</div>` : ''}
        </div>
        <div class="vs-center">
          <div class="vs-label">VS</div>
          <div class="prize-amount">🏆 ${prize}</div>
          ${betsCount > 0 ? `<div class="total-bet">🎯 ${betsCount} รายการ</div>` : ''}
        </div>
        <div class="bull-side">
          <div class="bull-icon bull-blue">🐂</div>
          <div class="bull-name" style="color:#8cb4ff;">${m.name_b || 'ทีมเยือน'}</div>
          ${m.owner_b ? `<div class="bull-owner">${m.owner_b}</div>` : ''}
          ${m.weight_b ? `<div class="bull-weight">⚖️ ${m.weight_b} กก.</div>` : ''}
        </div>
      </div>
    </div>
    ${winnerRow}
    <div class="card-footer">
      <span class="bets-count">📋 รายการเดิมพัน: <b>${betsCount}</b></span>
      <button class="btn-bet" 
        onclick="goToBet('${m.id}')">
        ${isDone ? '📊 ดูผล' : isLive ? '🔴 เข้าชมสด' : '🎯 เข้าดูและวางเดิมพัน →'}
      </button>
    </div>
  </div>`;
}

function showEmpty(msg) {
  document.getElementById('matches-container').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">${msg}</div>
    </div>`;
}

function goToBet(matchId) {
  window.location.href = `wuachon-match.html?id=${matchId}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
